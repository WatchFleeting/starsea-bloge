<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>鸿渚术术播放器</title>
    <link rel="icon" href="img/logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; cursor: none; }
        body {
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: #0a0e1a;
            font-family: 'Segoe UI', 'Roboto', system-ui, 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            cursor: none;
        }
        .cursor-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 99999;
        }
        .cursor-layer img {
            position: fixed; top: 0; left: 0; pointer-events: none;
        }
        a, button, .control-btn, .mode-btn, .track-item, .speed-option,
        .declaration-header, #downloadBtn, #speedLabel, .volume-slider::-webkit-slider-thumb {
            cursor: none;
        }

        .app {
            width: 100%; height: 100%;
            background: transparent;
            backdrop-filter: none;
            display: flex;
            box-shadow: 0 0 0 1.5px rgba(56,189,248,0.3);
            border-radius: 16px;
            overflow: hidden;
            position: relative; z-index: 2;
            transition: all 0.2s;
        }
        .bg-visualizer {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            background: #03050c;
            filter: blur(4px) brightness(0.72);
            opacity: 0.92;
        }
        .bg-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: block; }
        #bgMergedCanvas { width: 100%; height: 100%; background: #010102; }

        .sidebar {
            width: 260px;
            background: rgba(16, 22, 32, 0.5);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(6,182,212,0.3);
            display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
            border-radius: 16px 0 0 16px;
        }
        .playlist-header {
            padding: 12px 14px;
            background: rgba(12, 18, 28, 0.9);
            border-bottom: 2px solid #06b6d4;
            border-radius: 16px 0 0 0;
        }
        .playlist-header h2 {
            font-size: 1rem; font-weight: 700; display: flex; align-items: center; gap: 8px;
            color: #eef5ff;
        }
        .playlist-header h2 i { font-size: 1.1rem; color: #66ccff; }
        .playlist-stats {
            font-size: 0.65rem; color: #bdd4ff; margin-top: 6px;
            display: flex; justify-content: space-between;
            border-top: 1px solid rgba(102,204,255,0.3); padding-top: 6px;
        }
        .search-box {
            margin-top: 8px; background: rgba(26,37,56,0.6);
            display: flex; align-items: center; padding: 4px 10px;
            border: 1px solid #06b6d4; border-radius: 20px;
        }
        .search-box i { color: #66ccff; font-size: 0.7rem; margin-right: 6px; }
        .search-box input {
            background: transparent; border: none; outline: none;
            color: #eef5ff; width: 100%; font-size: 0.75rem;
        }
        .playlist-container {
            flex: 1; overflow-y: auto; padding: 6px 0;
        }
        .playlist-container::-webkit-scrollbar { width: 5px; }
        .playlist-container::-webkit-scrollbar-track { background: #1a2638; border-radius: 3px; }
        .playlist-container::-webkit-scrollbar-thumb { background: #66ccff; border-radius: 3px; }

        .track-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 12px; margin: 2px 8px;
            background: rgba(24, 32, 44, 0.45);
            border-left: 3px solid transparent;
            border-radius: 10px;
            transition: all 0.2s ease;
        }
        .track-item:hover { background: rgba(51, 68, 92, 0.8); border-left-color: #66ccff; }
        .track-item.active-track {
            background: rgba(6, 182, 212, 0.25);
            border-left-color: #06b6d4;
            box-shadow: inset 0 0 0 1px rgba(6,182,212,0.4);
        }
        .track-info { flex: 1; overflow: hidden; display: flex; align-items: center; gap: 8px; }
        .track-thumb {
            width: 28px; height: 28px; background: #10161f;
            border: 1px solid #06b6d4; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; flex-shrink: 0;
        }
        .track-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .track-thumb i { font-size: 12px; color: #66ccff; }
        .track-name {
            font-size: 0.7rem; font-weight: 500; white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis; color: #eef3ff;
        }
        .track-duration { font-size: 0.6rem; color: #9ab3e6; font-family: monospace; margin-left: 4px; }
        .track-play-icon { opacity: 0; font-size: 0.7rem; color: #06b6d4; transition: opacity 0.15s; }
        .track-item.active-track .track-play-icon { opacity: 1; }

        .main-panel {
            flex: 1; display: flex; flex-direction: column;
            background: rgba(10, 15, 25, 0.3); backdrop-filter: blur(10px);
            padding: 14px 18px; min-width: 0; overflow: hidden;
            border-radius: 0 16px 16px 0;
            justify-content: center;
        }
        .now-playing-card {
            display: flex; gap: 14px; margin-bottom: 12px; align-items: center;
            background: rgba(22, 30, 42, 0.55);
            padding: 12px 16px; border-radius: 14px;
        }
        .cover-box {
            width: 52px; height: 52px;
            background: #0c111c;
            border: 2px solid #66ccff;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; flex-shrink: 0;
            box-shadow: 0 0 12px rgba(6,182,212,0.4);
        }
        .cover-box.rotating { animation: discRotate 8s linear infinite; }
        @keyframes discRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .cover-box.rotating-pause { animation-play-state: paused; }
        .cover-box img { width: 100%; height: 100%; object-fit: cover; }
        .cover-fallback { color: #66ccff; font-size: 1.8rem; }

        .track-meta { flex: 1; min-width: 0; overflow: hidden; }
        .track-meta .song-title {
            font-size: 0.9rem; font-weight: 600; color: #e0f0ff;
            margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .time-info { font-size: 0.65rem; color: #bbd4ff; display: flex; gap: 10px; margin-bottom: 6px; }
        .progress-container { cursor: pointer; }
        .progress-bar {
            width: 100%; height: 5px; background: #1e2a3c;
            border-radius: 3px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; width: 0%; background: linear-gradient(to right, #66ccff, #06b6d4);
            border-radius: 3px; box-shadow: 0 0 8px rgba(6,182,212,0.5);
            transition: width 0.1s;
        }

        .controls { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .controls-row { display: flex; justify-content: center; align-items: center; gap: 14px; flex-wrap: wrap; }
        .control-btn {
            background: rgba(27, 37, 55, 0.65);
            border: 1px solid #06b6d4;
            width: 36px; height: 36px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; cursor: pointer; color: #66ccff;
            transition: all 0.2s ease;
        }
        .control-btn:hover {
            background: rgba(6, 182, 212, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(6,182,212,0.4);
        }
        .control-btn:active { transform: scale(0.94); }
        .control-btn.play-btn {
            background: #66ccff; border-color: #06b6d4;
            color: #0a121f; width: 44px; height: 44px; border-radius: 14px;
            font-size: 1.3rem;
        }
        .control-btn.play-btn:hover {
            background: #06b6d4;
            box-shadow: 0 4px 14px rgba(6,182,212,0.6);
        }

        .mode-group { display: flex; background: rgba(19, 29, 44, 0.6); border-radius: 10px; overflow: hidden; }
        .mode-btn {
            background: none; border: none; color: #66ccff; font-size: 0.75rem;
            padding: 6px 14px; transition: all 0.2s ease;
        }
        .mode-btn:hover { background: rgba(6, 182, 212, 0.25); }
        .mode-btn.active-mode { background: #06b6d4; color: #0a111c; font-weight: bold; border-radius: 8px; }

        .volume-wrap { display: flex; align-items: center; gap: 6px; }
        .volume-slider { width: 70px; height: 4px; background: #2d3f54; border-radius: 2px; -webkit-appearance: none; }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 12px; height: 12px; background: #66ccff;
            border-radius: 50%; cursor: pointer;
        }

        .speed-wrap { position: relative; }
        #speedLabel {
            cursor: pointer; padding: 4px 12px;
            background: rgba(27,37,55,0.7); border: 1px solid #06b6d4;
            border-radius: 8px; font-size: 0.75rem; color: #66ccff;
            transition: all 0.2s;
        }
        #speedLabel:hover { background: rgba(6,182,212,0.3); }
        .speed-dropdown {
            position: absolute; bottom: 110%; right: 0; margin-bottom: 5px;
            background: rgba(27,37,55,0.95); backdrop-filter: blur(8px);
            border: 1px solid #06b6d4; border-radius: 8px; min-width: 80px;
            opacity: 0; visibility: hidden; transform: translateY(10px);
            transition: all 0.2s;
        }
        .speed-dropdown.open { opacity: 1; visibility: visible; transform: translateY(0); }
        .speed-option {
            padding: 6px 14px; color: #66ccff; font-size: 0.7rem;
            text-align: center; transition: background 0.15s;
        }
        .speed-option:hover { background: rgba(6,182,212,0.4); }
        .speed-option.active-speed { background: #06b6d4; color: #0a111c; }

        #downloadBtn {
            background: #66ccff; border: none; color: #0a121f;
            font-size: 0.75rem; padding: 6px 16px; border-radius: 8px;
            transition: all 0.2s;
        }
        #downloadBtn:hover { background: #06b6d4; transform: scale(1.03); }

        .declaration-wrap {
            margin-top: 12px; padding-top: 10px;
            border-top: 1px solid rgba(6,182,212,0.3);
            font-size: 0.62rem; color: #bbd4ff;
        }
        .declaration-header {
            display: flex; justify-content: space-between; padding: 4px 8px;
            cursor: pointer; border-radius: 6px; transition: background 0.2s;
        }
        .declaration-header:hover { background: rgba(6,182,212,0.15); }
        .declaration-content { max-height: 0; overflow: hidden; transition: max-height 0.35s; }
        .declaration-content.open { max-height: 200px; }
        .author-row {
            margin-top: 8px; padding-top: 6px;
            border-top: 1px solid rgba(6,182,212,0.2);
            display: flex; align-items: center; gap: 6px;
        }
        .author-avatar { width: 18px; height: 18px; border-radius: 50%; border: 1px solid #66ccff; }

        @media (max-width: 700px) {
            .app { border-radius: 0; }
            .sidebar { border-radius: 0; }
            .main-panel { border-radius: 0; }
        }
    </style>
</head>
<body>
<div class="cursor-layer" id="cursorLayer">
    <img src="img/zhengchang_luoxiaohei.gif" alt="cursor">
</div>
<div class="bg-visualizer">
    <canvas id="bgMergedCanvas" class="bg-canvas"></canvas>
</div>

<div class="app">
    <div class="sidebar">
        <div class="playlist-header">
            <h2><i class="fas fa-music"></i> 鸿渚术术播放器</h2>
            <div class="playlist-stats">
                <span id="trackCount">0 曲</span>
                <span>术力口 ♪(^∇^*)</span>
            </div>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="筛选歌曲...">
            </div>
        </div>
        <div class="playlist-container" id="playlistContainer"></div>
    </div>
    <div class="main-panel">
        <div class="now-playing-card">
            <div class="cover-box" id="coverBox">
                <img id="coverImg" src="" alt="cover" style="display:none;">
                <i class="fas fa-compact-disc cover-fallback" id="coverFallback"></i>
            </div>
            <div class="track-meta">
                <div class="song-title" id="currentTrackName">暂无歌曲</div>
                <div class="time-info">
                    <span id="currentTime">0:00</span> / <span id="totalDuration">0:00</span>
                </div>
                <div class="progress-container" id="progressContainer">
                    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                </div>
            </div>
        </div>
        <div class="controls">
            <div class="controls-row">
                <div class="control-btn" id="prevBtn"><i class="fas fa-backward-step"></i></div>
                <div class="control-btn play-btn" id="playPauseBtn"><i class="fas fa-play"></i></div>
                <div class="control-btn" id="nextBtn"><i class="fas fa-forward-step"></i></div>
            </div>
            <div class="controls-row">
                <div class="volume-wrap">
                    <i class="fas fa-volume-down" style="color:#66ccff;"></i>
                    <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.01" value="0.7">
                    <i class="fas fa-volume-up" style="color:#06b6d4;"></i>
                </div>
                <div class="speed-wrap">
                    <span id="speedLabel">倍速 1x ▾</span>
                    <div class="speed-dropdown" id="speedDropdown">
                        <div class="speed-option" data-speed="0.75">0.75x</div>
                        <div class="speed-option active-speed" data-speed="1">1.0x</div>
                        <div class="speed-option" data-speed="1.5">1.5x</div>
                        <div class="speed-option" data-speed="2">2.0x</div>
                    </div>
                </div>
            </div>
            <div class="controls-row">
                <div class="mode-group">
                    <button class="mode-btn" data-mode="order"><i class="fas fa-list"></i> 顺序</button>
                    <button class="mode-btn" data-mode="random"><i class="fas fa-shuffle"></i> 随机</button>
                    <button class="mode-btn" data-mode="loop"><i class="fas fa-repeat"></i> 循环</button>
                </div>
                <button class="mode-btn" id="downloadBtn"><i class="fas fa-download"></i> 下载</button>
            </div>
            <div class="declaration-wrap">
                <div class="declaration-header" id="declarationHeader">
                    <span>OwO 声明</span>
                    <i class="fas fa-chevron-down" id="declarationIcon"></i>
                </div>
                <div class="declaration-content" id="declarationContent">
                    <div style="padding:4px 0;">
                        本播放器收录的术力口歌曲均为个人积累，包含原作及部分二创。<br>
                        如涉及版权或侵权，请联系修改，谢谢！<br>
                        <a href="#" style="color:#66ccff;">点击私信联系</a>
                    </div>
                </div>
                <div class="author-row">
                    <span>作者：</span>
                    <img class="author-avatar" src="img/logo.png" alt="头像">
                    <a href="https://space.bilibili.com/3493109964999279" target="_blank" style="color:#66ccff;">鸿渚</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ===== 播放器核心逻辑 =====
    let masterTrackList = [], displayList = [], currentIdx = 0, playMode = 'order';
    let audioElem = null, isPlaying = false, isUserInteracted = false;
    let audioCtx = null, mediaSourceNode = null, analyserNode = null, animFrame = null, bgCanvas = null, bgCtx = null;
    let visualizerReady = false;
    const imageCache = new Map();

    const playlistContainer = document.getElementById('playlistContainer');
    const searchInput = document.getElementById('searchInput');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    const speedLabel = document.getElementById('speedLabel');
    const speedDropdown = document.getElementById('speedDropdown');
    let currentSpeed = 1;
    const progressContainer = document.getElementById('progressContainer');
    const progressFill = document.getElementById('progressFill');
    const currentTimeSpan = document.getElementById('currentTime');
    const totalDurationSpan = document.getElementById('totalDuration');
    const currentTrackNameSpan = document.getElementById('currentTrackName');
    const coverImg = document.getElementById('coverImg');
    const coverFallback = document.getElementById('coverFallback');
    const trackCountSpan = document.getElementById('trackCount');
    const modeBtns = document.querySelectorAll('.mode-btn[data-mode]');
    const downloadBtn = document.getElementById('downloadBtn');
    const declarationHeader = document.getElementById('declarationHeader');
    const declarationContent = document.getElementById('declarationContent');
    const declarationIcon = document.getElementById('declarationIcon');

    // 本地备用路径
    const LOCAL_BASE = 'https://watchfleeting.github.io/starsea-bloge/Vocaloid/';

    // 构建媒体URL，优先使用 WebOS 映射
    function buildMediaUrls(songName) {
        const songMapping = getWebosUrl('songs', songName);
        if (songMapping) {
            return {
                mp3Url: songMapping.mp3,
                coverUrl: songMapping.cover
            };
        }
        const encoded = encodeURIComponent(songName);
        return { 
            mp3Url: LOCAL_BASE + encoded + '.mp3', 
            coverUrl: LOCAL_BASE + 'png/' + encoded + '.png' 
        };
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;')); }
    function updateTrackCountUI() { trackCountSpan.innerText = `已收录 ${displayList.length} 曲`; }

    function setTrackThumb(idx, url) {
        const td = document.getElementById(`thumb-${idx}`);
        if (!td) return;
        if (imageCache.has(url)) { td.innerHTML = ''; td.appendChild(imageCache.get(url).cloneNode(true)); return; }
        const img = document.createElement('img');
        img.src = url; img.style.width = '28px'; img.style.height = '28px';
        img.onload = () => {
            imageCache.set(url, img.cloneNode(true));
            const cur = document.getElementById(`thumb-${idx}`);
            if (cur) { cur.innerHTML = ''; cur.appendChild(img.cloneNode(true)); }
        };
        img.onerror = () => { const cur = document.getElementById(`thumb-${idx}`); if (cur) cur.innerHTML = '<i class="fas fa-music"></i>'; };
        td.innerHTML = ''; td.appendChild(img);
    }

    function renderPlaylistWithThumbs() {
        if (!playlistContainer) return;
        playlistContainer.innerHTML = '';
        displayList.forEach((track, idx) => {
            const div = document.createElement('div');
            div.className = 'track-item' + (currentIdx === idx ? ' active-track' : '');
            div.innerHTML = `
                <div class="track-info">
                    <div class="track-thumb" id="thumb-${idx}"><i class="fas fa-image"></i></div>
                    <div class="track-name">${escapeHtml(track.name)}</div>
                    <div class="track-duration">${track.duration}</div>
                </div>
                <div class="track-play-icon"><i class="fas fa-play"></i></div>
            `;
            div.addEventListener('click', (e) => {
                e.stopPropagation(); isUserInteracted = true;
                if (currentIdx === idx && audioElem && !audioElem.paused) togglePlayPause();
                else { currentIdx = idx; loadTrackByIndex(currentIdx, true); }
                renderPlaylistWithThumbs(); scrollToCurrentTrack();
            });
            playlistContainer.appendChild(div);
            setTrackThumb(idx, track.coverUrl);
        });
        setTimeout(scrollToCurrentTrack, 80);
    }

    function scrollToCurrentTrack() {
        const active = playlistContainer?.querySelector('.track-item.active-track');
        if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function updateProgress() {
        if (audioElem && audioElem.duration && !isNaN(audioElem.duration)) {
            progressFill.style.width = `${(audioElem.currentTime / audioElem.duration) * 100}%`;
            const mins = Math.floor(audioElem.currentTime / 60), secs = Math.floor(audioElem.currentTime % 60);
            currentTimeSpan.innerText = `${mins}:${secs.toString().padStart(2, '0')}`;
        }
    }

    function onTrackEnd() {
        if (playMode === 'loop') { audioElem.currentTime = 0; audioElem.play().catch(()=>{}); }
        else if (playMode === 'random') playRandomTrack();
        else playNextTrack();
    }
    function playNextTrack() { if (!displayList.length) return; currentIdx = (currentIdx + 1) % displayList.length; loadTrackByIndex(currentIdx, true); }
    function playRandomTrack() {
        if (displayList.length <= 1) { if(audioElem) audioElem.currentTime = 0; return; }
        let newIdx = Math.floor(Math.random() * displayList.length);
        while (newIdx === currentIdx && displayList.length > 1) newIdx = Math.floor(Math.random() * displayList.length);
        currentIdx = newIdx; loadTrackByIndex(currentIdx, true);
    }
    function playPrevTrack() { if (!displayList.length) return; currentIdx = (currentIdx - 1 + displayList.length) % displayList.length; loadTrackByIndex(currentIdx, true); }
    function togglePlayPause() {
        isUserInteracted = true;
        if (!audioElem) { if (displayList.length) loadTrackByIndex(currentIdx, true); return; }
        if (isPlaying) audioElem.pause();
        else audioElem.play().catch(() => {});
    }

    function loadTrackByIndex(index, autoPlay = true) {
        if (!displayList.length || index < 0 || index >= displayList.length) return;
        const track = displayList[index];
        if (!track) return;
        if (audioElem) { audioElem.pause(); audioElem.src = ''; audioElem = null; }
        currentTrackNameSpan.innerText = track.name;
        totalDurationSpan.innerText = track.duration;
        progressFill.style.width = '0%'; currentTimeSpan.innerText = '0:00';
        if (imageCache.has(track.coverUrl)) {
            coverImg.src = imageCache.get(track.coverUrl).src;
            coverImg.style.display = 'block'; coverFallback.style.display = 'none';
        } else {
            coverImg.style.display = 'block';
            coverImg.src = track.coverUrl;
            coverImg.onerror = () => { coverImg.style.display = 'none'; coverFallback.style.display = 'flex'; };
            coverFallback.style.display = 'none';
            coverImg.onload = () => {
                const cloned = coverImg.cloneNode(true);
                imageCache.set(track.coverUrl, cloned);
                coverImg.style.display = 'block'; coverFallback.style.display = 'none';
            };
        }
        const coverBox = document.querySelector('.cover-box');
        if (coverBox) {
            coverBox.classList.remove('rotating', 'rotating-pause');
            if (isPlaying) coverBox.classList.add('rotating');
        }
        audioElem = new Audio();
        audioElem.crossOrigin = 'anonymous';
        audioElem.preload = 'metadata';
        audioElem.src = track.mp3Url;
        audioElem.volume = parseFloat(volumeSlider.value);
        audioElem.addEventListener('loadedmetadata', () => {
            if (audioElem && !isNaN(audioElem.duration)) {
                const mins = Math.floor(audioElem.duration / 60), secs = Math.floor(audioElem.duration % 60);
                totalDurationSpan.innerText = `${mins}:${secs.toString().padStart(2, '0')}`;
            }
        });
        audioElem.addEventListener('timeupdate', updateProgress);
        audioElem.addEventListener('ended', onTrackEnd);
        audioElem.addEventListener('play', () => {
            isPlaying = true;
            playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
            if (!visualizerReady) initBackgroundVisualizer();
            coverBox?.classList.add('rotating'); coverBox?.classList.remove('rotating-pause');
        });
        audioElem.addEventListener('pause', () => {
            isPlaying = false;
            playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
            coverBox?.classList.add('rotating-pause');
        });
        if (autoPlay) audioElem.play().catch(() => {});
        renderPlaylistWithThumbs();
        scrollToCurrentTrack();
    }

    async function initBackgroundVisualizer() {
        if (!audioElem || visualizerReady) return;
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            mediaSourceNode = audioCtx.createMediaElementSource(audioElem);
            analyserNode = audioCtx.createAnalyser();
            analyserNode.fftSize = 1024;
            mediaSourceNode.connect(analyserNode);
            analyserNode.connect(audioCtx.destination);
            visualizerReady = true;

            bgCanvas = document.getElementById('bgMergedCanvas');
            bgCtx = bgCanvas.getContext('2d');
            const timeArray = new Uint8Array(analyserNode.fftSize);
            const freqArray = new Uint8Array(analyserNode.frequencyBinCount);
            function draw() {
                if (!analyserNode || !audioElem || audioElem.paused) { animFrame = requestAnimationFrame(draw); return; }
                analyserNode.getByteTimeDomainData(timeArray);
                analyserNode.getByteFrequencyData(freqArray);
                bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
                animFrame = requestAnimationFrame(draw);
            }
            draw();
        } catch(e) { /* 忽略 */ }
    }

    function filterPlaylist() {
        const kw = searchInput.value.trim().toLowerCase();
        displayList = kw ? masterTrackList.filter(t => t.name.toLowerCase().includes(kw)) : [...masterTrackList];
        currentIdx = 0; updateTrackCountUI(); renderPlaylistWithThumbs();
        if (displayList.length) loadTrackByIndex(0, false); else resetPlayerUI();
    }
    function resetPlayerUI() {
        currentTrackNameSpan.innerText = "无歌曲"; totalDurationSpan.innerText = "0:00";
        progressFill.style.width = "0%"; coverImg.style.display = 'none'; coverFallback.style.display = 'flex';
    }
    function setPlayMode(mode) {
        playMode = mode;
        modeBtns.forEach(btn => btn.classList.toggle('active-mode', btn.dataset.mode === mode));
    }

    function bindEvents() {
        prevBtn.addEventListener('click', playPrevTrack);
        nextBtn.addEventListener('click', () => playMode === 'random' ? playRandomTrack() : playNextTrack());
        playPauseBtn.addEventListener('click', togglePlayPause);
        volumeSlider.addEventListener('input', (e) => { if(audioElem) audioElem.volume = parseFloat(e.target.value); });
        let speedMenuOpen = false;
        const speedOptions = document.querySelectorAll('.speed-option');
        const setSpeed = (speed, update = true) => {
            currentSpeed = speed;
            if (audioElem) audioElem.playbackRate = speed;
            speedOptions.forEach(opt => opt.classList.toggle('active-speed', parseFloat(opt.dataset.speed) === speed));
            if (update && speedLabel) speedLabel.innerHTML = `倍速 ${speed}x ▾`;
        };
        speedLabel.addEventListener('click', (e) => {
            e.stopPropagation();
            speedMenuOpen = !speedMenuOpen;
            speedDropdown.classList.toggle('open', speedMenuOpen);
        });
        speedOptions.forEach(opt => opt.addEventListener('click', (e) => {
            e.stopPropagation();
            setSpeed(parseFloat(opt.dataset.speed));
            speedMenuOpen = false;
            speedDropdown.classList.remove('open');
        }));
        document.addEventListener('click', () => {
            if (speedMenuOpen) { speedMenuOpen = false; speedDropdown.classList.remove('open'); }
        });
        setSpeed(1, true);

        downloadBtn?.addEventListener('click', () => { if (audioElem?.src) window.open(audioElem.src, '_blank'); });
        declarationHeader?.addEventListener('click', () => {
            declarationContent.classList.toggle('open');
            declarationIcon.classList.toggle('fa-chevron-up');
        });
        progressContainer.addEventListener('click', (e) => {
            if(audioElem && audioElem.duration) {
                const rect = progressContainer.getBoundingClientRect();
                audioElem.currentTime = ((e.clientX - rect.left) / rect.width) * audioElem.duration;
            }
        });
        searchInput.addEventListener('input', filterPlaylist);
        modeBtns.forEach(btn => btn.addEventListener('click', () => setPlayMode(btn.dataset.mode)));

        document.body.addEventListener('click', async () => {
            if (!audioElem || isPlaying) return;
            try { await audioElem.play(); } catch(e) {}
        });
    }

    async function fetchPlaylist() {
        try {
            const apiUrl = 'https://api.github.com/repos/WatchFleeting/starsea-bloge/contents/Vocaloid';
            const res = await fetch(apiUrl);
            if (!res.ok) throw new Error('API失败');
            const files = await res.json();
            const mp3s = files.filter(f => f.name.endsWith('.mp3') && !f.name.includes('bad apple'));
            masterTrackList = mp3s.map(f => {
                const name = f.name.replace(/\.mp3$/i, '');
                const { mp3Url, coverUrl } = buildMediaUrls(name);
                return { name, duration: "03:00", mp3Url, coverUrl };
            });
            displayList = [...masterTrackList];
            updateTrackCountUI();
            renderPlaylistWithThumbs();
            if (displayList.length) { currentIdx = 0; loadTrackByIndex(0, false); }
        } catch(err) {
            try {
                const jsonResp = await fetch('https://watchfleeting.github.io/starsea-bloge/Vocaloid/Vdata.json');
                if (jsonResp.ok) {
                    const data = await jsonResp.json();
                    masterTrackList = data.map(item => {
                        const { mp3Url, coverUrl } = buildMediaUrls(item.name);
                        return { name: item.name, duration: item.duration, mp3Url, coverUrl };
                    });
                    displayList = [...masterTrackList];
                    updateTrackCountUI(); renderPlaylistWithThumbs();
                    if (displayList.length) { currentIdx = 0; loadTrackByIndex(0, false); }
                }
            } catch(e) { console.error("JSON also failed", e); }
        }
    }

    function init() {
        bindEvents();
        fetchPlaylist();
        setPlayMode('order');
        // 自定义光标
        (function() {
            const layer = document.getElementById('cursorLayer');
            if (!layer) return;
            const img = layer.querySelector('img');
            img.style.position = 'fixed'; img.style.top = '0'; img.style.left = '0';
            img.style.pointerEvents = 'none';
            let mouseX = 0, mouseY = 0, lastX = 0, lastY = 0, targetRotate = 0, currentRotate = 0, rafId, shown = false;
            document.addEventListener('mousemove', (e) => {
                const dx = e.clientX - lastX, dy = e.clientY - lastY;
                targetRotate = Math.min(10, Math.max(-10, dx * 1.2 + dy * 0.2));
                lastX = e.clientX; lastY = e.clientY; mouseX = e.clientX; mouseY = e.clientY;
                if (!shown) { img.style.opacity = 1; img.style.transform = `translate(${mouseX}px,${mouseY}px) rotate(0deg)`; shown = true; }
                if (!rafId) rafId = requestAnimationFrame(updateCursor);
            });
            function updateCursor() {
                currentRotate = currentRotate * 0.65 + targetRotate * 0.35;
                img.style.transform = `translate(${mouseX}px,${mouseY}px) rotate(${currentRotate.toFixed(2)}deg)`;
                rafId = null;
            }
            const style = document.createElement('style');
            style.textContent = '* { cursor: none !important; }';
            document.head.appendChild(style);
        })();
    }
    init();
</script>
</body>
</html>
