<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title data-i18n="tags">标签浏览 · 鸿渚の灵质空间</title>
    <meta name="description" content="按标签浏览文章">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="common.css">
    <link rel="icon" id="dynamic-favicon" href="img/ico_1.ico">
    <style>
        .main-container { max-width: 1000px; margin: 90px auto 60px; padding: 0 1.5rem; }
        .tags-card {
            background: var(--bg-card); border: 1px solid var(--border-light);
            border-radius: var(--radius-card); padding: 2rem;
            box-shadow: var(--shadow-md); margin-bottom: 1.5rem;
        }
        .tags-title {
            font-size: 1.8rem; font-weight: 700; color: var(--primary-600);
            margin-bottom: 1.2rem; display: flex; align-items: center; gap: 0.5rem;
        }
        .tag-cloud { display: flex; flex-wrap: wrap; gap: 0.6rem; }
        .tag-bubble {
            display: inline-block; background: var(--bg-page); border: 1px solid var(--border-light);
            padding: 0.45rem 1.2rem; border-radius: 40px; font-size: 0.9rem;
            color: var(--text-desc); cursor: pointer; transition: var(--transition);
            text-decoration: none;
        }
        .tag-bubble:hover {
            background: var(--primary-500); color: white; border-color: var(--primary-500);
            transform: scale(1.05);
        }
        .tag-detail-card {
            background: var(--bg-card); border: 1px solid var(--border-light);
            border-radius: var(--radius-card); padding: 2rem;
            box-shadow: var(--shadow-md);
        }
        .tag-detail-title {
            font-size: 1.4rem; font-weight: 700; color: var(--primary-600);
            margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem;
        }
        .tag-resources { display: flex; flex-direction: column; gap: 0.8rem; }
        .tag-resource-item {
            display: flex; align-items: center; padding: 1rem;
            background: var(--bg-page); border: 1px solid var(--border-light);
            border-radius: 14px; text-decoration: none; color: inherit;
            transition: var(--transition); cursor: pointer;
        }
        .tag-resource-item:hover {
            border-color: var(--primary-400); box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }
        .tag-resource-icon {
            width: 40px; height: 40px; border-radius: 50%;
            background: linear-gradient(145deg, var(--primary-400), var(--secondary-400));
            display: flex; align-items: center; justify-content: center;
            color: white; margin-right: 1rem; font-size: 1.2rem;
        }
        .tag-resource-info { flex: 1; }
        .tag-resource-info h4 { font-size: 1rem; margin-bottom: 0.2rem; color: var(--text-title); }
        .tag-resource-info p { color: var(--text-muted); font-size: 0.85rem; }
        .loading, .empty-state { text-align: center; padding: 2rem; color: var(--text-muted); }
    </style>
</head>
<body>
<div class="bg-layer"></div>
<main class="main-container">
    <div id="tagCloudContainer" class="tags-card">
        <h1 class="tags-title"><i class="fas fa-tags"></i> <span>标签云</span></h1>
        <div class="tag-cloud" id="tagCloud">
            <div class="loading"><i class="fas fa-spinner fa-pulse"></i> 加载中...</div>
        </div>
    </div>
    <div id="tagDetailContainer" class="tag-detail-card" style="display:none;">
        <h2 class="tag-detail-title" id="selectedTagTitle">
            <i class="fas fa-hashtag" style="color: var(--primary-500);"></i>
            <span id="selectedTagName"></span>
        </h2>
        <div id="tagResourcesList" class="tag-resources"></div>
    </div>
</main>
<script src="common.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        const tagCloudDiv = document.getElementById('tagCloud');
        const tagDetailDiv = document.getElementById('tagDetailContainer');
        const selectedTagSpan = document.getElementById('selectedTagName');
        const resourcesListDiv = document.getElementById('tagResourcesList');
        let allContent = [];
        let tagMap = new Map();

        try {
            allContent = await getAllContent();
            allContent.forEach(item => {
                const tags = item.meta.tags || [];
                if (Array.isArray(tags)) {
                    tags.forEach(tag => {
                        const normalized = tag.trim().replace(/^#/, '');
                        if (!normalized) return;
                        if (!tagMap.has(normalized)) tagMap.set(normalized, []);
                        tagMap.get(normalized).push(item);
                    });
                }
            });

            if (tagMap.size === 0) {
                tagCloudDiv.innerHTML = '<div class="empty-state">暂无标签</div>';
            } else {
                const sortedTags = Array.from(tagMap.entries()).sort((a, b) => b[1].length - a[1].length);
                tagCloudDiv.innerHTML = sortedTags.map(([tag, resources]) =>
                    `<span class="tag-bubble" data-tag="${escapeHtml(tag)}">#${escapeHtml(tag)} (${resources.length})</span>`
                ).join('');
                document.querySelectorAll('.tag-bubble').forEach(el => {
                    el.addEventListener('click', () => showTagDetail(el.dataset.tag));
                });
            }
        } catch (e) {
            tagCloudDiv.innerHTML = `<div class="error-text">加载失败：${escapeHtml(e.message)}</div>`;
        }

        function showTagDetail(tag) {
            const items = tagMap.get(tag) || [];
            selectedTagSpan.textContent = tag;
            if (items.length === 0) {
                resourcesListDiv.innerHTML = '<p class="empty-state">该标签下暂无内容</p>';
            } else {
                resourcesListDiv.innerHTML = items.map(item => {
                    const meta = item.meta;
                    return `
                        <div class="tag-resource-item" data-title="${escapeHtml(meta.title||'')}" data-date="${escapeHtml(meta.date||'')}" data-content="${encodeURIComponent(item.content)}" data-meta='${encodeURIComponent(JSON.stringify(meta))}'>
                            <div class="tag-resource-icon"><i class="fas fa-file-alt"></i></div>
                            <div class="tag-resource-info">
                                <h4>${escapeHtml(meta.title || '无标题')}</h4>
                                <p>${meta.summary ? escapeHtml(meta.summary).substring(0, 80) : ''}</p>
                            </div>
                        </div>`;
                }).join('');
                document.querySelectorAll('.tag-resource-item').forEach(el => {
                    el.addEventListener('click', () => {
                        const meta = JSON.parse(decodeURIComponent(el.dataset.meta));
                        showArticleDetail(el.dataset.title, el.dataset.date, decodeURIComponent(el.dataset.content), meta);
                    });
                });
            }
            tagDetailDiv.style.display = 'block';
            tagDetailDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    });
</script>
</body>
</html>
