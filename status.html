<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统状态 · 鸿渚の灵质空间</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="common.css">
    <link rel="icon" id="dynamic-favicon" href="img/ico_1.ico">
    <style>
        .main-container { max-width: 900px; margin: 90px auto 60px; padding: 0 1.5rem; }
        .status-card {
            background: var(--bg-card); border: 1px solid var(--border-light);
            border-radius: var(--radius-card); padding: 1.8rem;
            box-shadow: var(--shadow-md); margin-bottom: 1.5rem;
        }
        .status-title {
            font-size: 1.6rem; font-weight: 700; color: var(--primary-600);
            margin-bottom: 1.2rem; display: flex; align-items: center; gap: 0.6rem;
        }
        .btn-refresh {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 10px 20px; background: var(--primary-500); color: white;
            border: none; border-radius: 40px; font-weight: 600;
            font-size: 0.95rem; cursor: pointer; transition: var(--transition);
            margin-bottom: 1.5rem;
        }
        .btn-refresh:hover { background: var(--primary-600); transform: translateY(-1px); }
        .monitor-list { display: flex; flex-direction: column; gap: 0.8rem; }
        .monitor-item {
            background: var(--bg-page); border: 1px solid var(--border-light);
            border-radius: 14px; padding: 1rem 1.2rem;
            display: flex; align-items: center; gap: 1rem;
            transition: var(--transition);
        }
        .monitor-item:hover { border-color: var(--primary-400); box-shadow: var(--shadow-hover); }
        .monitor-icon {
            width: 44px; height: 44px; border-radius: 50%;
            background: linear-gradient(145deg, var(--primary-400), var(--secondary-400));
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1.2rem; flex-shrink: 0;
        }
        .monitor-info { flex: 1; min-width: 0; }
        .monitor-info h3 { font-size: 1rem; font-weight: 600; margin-bottom: 0.2rem; color: var(--text-title); }
        .monitor-info .monitor-url {
            font-size: 0.8rem; color: var(--text-muted);
            word-break: break-all; font-family: monospace;
        }
        .monitor-status {
            display: flex; align-items: center; gap: 0.5rem; font-weight: 600;
            font-size: 0.9rem; flex-shrink: 0;
        }
        .monitor-status.success { color: #16a34a; }
        .monitor-status.fail { color: #dc2626; }
        .monitor-status.warning { color: #d97706; }
        .monitor-latency { font-size: 0.8rem; color: var(--text-muted); margin-left: 0.5rem; }

        /* 可折叠部分 */
        .collapsible-header {
            display: flex; align-items: center; gap: 0.5rem;
            cursor: pointer; user-select: none; margin-top: 1.5rem;
            font-weight: 600; color: var(--primary-600);
        }
        .collapsible-header i { transition: transform 0.2s; }
        .collapsible-header.open i { transform: rotate(90deg); }
        .collapsible-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
        .collapsible-content.show { max-height: 2000px; }

        /* 代理列表保留原有风格 */
        .proxy-list { display: flex; flex-direction: column; gap: 8px; margin-top: 1rem; }
        .proxy-item {
            background: var(--bg-page); border: 1px solid var(--border-light);
            border-radius: 10px; padding: 10px 14px; display: flex;
            align-items: center; gap: 10px; font-size: 0.85rem;
        }
        .proxy-item .proxy-status { width: 28px; height: 28px; }
        .proxy-item .proxy-url { flex:1; font-family: monospace; font-size: 0.8rem; word-break: break-all; }
        .proxy-item .proxy-detail { font-size: 0.75rem; display: flex; gap: 10px; }

        @media (max-width: 600px) {
            .monitor-item { flex-wrap: wrap; }
            .monitor-status { width: 100%; }
        }
    </style>
</head>
<body>
<div class="bg-layer"></div>
<main class="main-container">
    <!-- 系统监控卡片 -->
    <div class="status-card">
        <h1 class="status-title"><i class="fas fa-heartbeat"></i> <span>系统状态监控</span></h1>
        <button class="btn-refresh" id="refreshAllBtn">
            <i class="fas fa-sync-alt"></i> 全部重新检测
        </button>
        <div class="monitor-list" id="monitorList">
            <div class="monitor-item"><div class="monitor-icon"><i class="fas fa-spinner fa-pulse"></i></div><div class="monitor-info"><h3>正在加载...</h3></div></div>
        </div>

        <!-- CORS 代理监控 (可折叠) -->
        <div class="collapsible-header" id="proxyToggle">
            <i class="fas fa-chevron-right"></i> <span>CORS 代理状态</span>
        </div>
        <div class="collapsible-content" id="proxyContent">
            <div class="proxy-list" id="proxyList">
                <div class="proxy-item"><span>加载中...</span></div>
            </div>
        </div>
    </div>
</main>

<script src="common.js"></script>
<script>
    const monitorListEl = document.getElementById('monitorList');
    const proxyListEl = document.getElementById('proxyList');
    const refreshAllBtn = document.getElementById('refreshAllBtn');
    const proxyToggle = document.getElementById('proxyToggle');
    const proxyContent = document.getElementById('proxyContent');

    // 折叠交互
    proxyToggle.addEventListener('click', () => {
        proxyToggle.classList.toggle('open');
        proxyContent.classList.toggle('show');
    });

    // ---------- 动态获取检测URL ----------
    async function getWallpaperTestUrl() {
        try {
            const data = await loadJSON('data/wallpapers.json');
            if (data.length === 0) return null;
            const item = data[0];
            const fileName = item.type === 'gallery' && item.images ? item.images[0] : item.filename;
            return getUrl('wallpapers', fileName);
        } catch (e) {
            return null;
        }
    }

    async function getEmojiTestUrl() {
        try {
            const emojis = await loadJSON('data/emojis.json');
            if (!emojis || emojis.length === 0) return null;
            // 随机选一个
            const randomIndex = Math.floor(Math.random() * emojis.length);
            const fileName = emojis[randomIndex].file;
            // 表情包图片优先 WebOS？这里保持本地方案，若需要 WebOS 可扩展
            const webosUrl = typeof getWebosUrl === 'function' ? getWebosUrl('emoji', fileName) : null;
            if (webosUrl) return webosUrl;
            return './emoji/' + encodeURIComponent(fileName);
        } catch (e) {
            return null;
        }
    }

    // 通用URL生成器（用于图片库，适配本地方案和 WebOS）
    function getUrl(category, fileName) {
        const webosUrl = typeof getWebosUrl === 'function' ? getWebosUrl(category, fileName) : null;
        if (webosUrl) return webosUrl;
        if (category === 'wallpapers') return './background/' + encodeURIComponent(fileName);
        if (category === 'emoji') return './emoji/' + encodeURIComponent(fileName);
        return '';
    }

    // 监控项定义 (动态URL在检测时生成)
    const monitors = [
        { name: '网站首页', icon: 'fa-home', url: '.' },
        { name: 'WebOS 连接', icon: 'fa-cloud', type: 'webos' },
        { name: '播放器资源', icon: 'fa-music', url: 'Vocaloid/Vdata.json', needJson: true },
        { name: '图片库资源', icon: 'fa-images', dynamicUrl: getWallpaperTestUrl },
        { name: '表情包资源', icon: 'fa-smile', dynamicUrl: getEmojiTestUrl },
        { name: '友链数据', icon: 'fa-link', url: 'data/friends.json', needJson: true },
        { name: '通知数据', icon: 'fa-bell', url: 'data/notifications.json', needJson: true },
        { name: '项目链接数据', icon: 'fa-folder', url: 'data/projects.json', needJson: true }
    ];

    function getWebosTestUrl() {
        if (typeof webosConfig === 'undefined' || !webosConfig) return null;
        const cfg = webosConfig.wallpapers || webosConfig.songs;
        if (cfg && cfg.base && cfg.shareId) {
            return `${cfg.base}/${cfg.shareId}/fallback.png`;
        }
        return null;
    }

    async function checkMonitor(item) {
        const start = performance.now();
        let success = false;
        let statusCode = 0;
        let errorMsg = '';
        let url = item.url;
        try {
            if (item.dynamicUrl) {
                url = await item.dynamicUrl();
                if (!url) throw new Error('无法获取检测URL');
            } else if (item.type === 'webos') {
                url = getWebosTestUrl();
                if (!url) throw new Error('WebOS 未配置');
            }
            if (!url) throw new Error('URL 为空');

            let resp = await fetch(url, { method: 'HEAD', cache: 'no-cache' });
            statusCode = resp.status;
            if (resp.ok) {
                success = true;
            } else if (statusCode === 404) {
                resp = await fetch(url, { cache: 'no-cache' });
                statusCode = resp.status;
                success = resp.ok;
            }
        } catch (e) {
            errorMsg = e.message;
            success = false;
        }
        const latency = Math.round(performance.now() - start);
        return { success, statusCode, latency, errorMsg, url };
    }

    function renderMonitorItem(item, result) {
        const iconClass = result.success ? 'fa-check-circle' : 'fa-times-circle';
        const statusClass = result.success ? 'success' : 'fail';
        const statusText = result.success ? '正常' : (result.errorMsg || `状态 ${result.statusCode}`);
        const urlDisplay = result.url || item.url || (item.type==='webos' ? 'WebOS 配置' : '');
        return `
            <div class="monitor-item">
                <div class="monitor-icon"><i class="fas ${item.icon}"></i></div>
                <div class="monitor-info">
                    <h3>${item.name}</h3>
                    <div class="monitor-url">${urlDisplay}</div>
                </div>
                <div class="monitor-status ${statusClass}">
                    <i class="fas ${iconClass}"></i> ${statusText}
                    <span class="monitor-latency">${result.success ? result.latency + 'ms' : ''}</span>
                </div>
            </div>
        `;
    }

    async function runMonitor() {
        monitorListEl.innerHTML = monitors.map(item => `
            <div class="monitor-item" id="mon-${item.name}">
                <div class="monitor-icon"><i class="fas ${item.icon}"></i></div>
                <div class="monitor-info"><h3>${item.name}</h3><p>检测中...</p></div>
            </div>
        `).join('');

        for (const item of monitors) {
            const result = await checkMonitor(item);
            const el = document.getElementById(`mon-${item.name}`);
            if (el) el.outerHTML = renderMonitorItem(item, result);
        }
    }

    // CORS 代理检测（保持不变）
    function renderProxyLoading() {
        proxyListEl.innerHTML = CORS_PROXIES.map(proxy => `
            <div class="proxy-item testing" id="proxy-${escapeHtml(proxy)}">
                <span class="proxy-status"><i class="fas fa-spinner fa-pulse"></i></span>
                <span class="proxy-url">${escapeHtml(proxy)}</span>
                <span class="proxy-detail">⏳ 检测中...</span>
            </div>
        `).join('');
    }

    async function testProxy(proxy, targetUrl) {
        const start = performance.now();
        try {
            const fullUrl = proxy + encodeURIComponent(targetUrl);
            const resp = await fetch(fullUrl);
            const end = performance.now();
            const latency = Math.round(end - start);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const json = await resp.json();
            if (json.code === 0) return { success: true, latency, name: json.data.name };
            else throw new Error(`API code ${json.code}`);
        } catch (e) {
            return { success: false, latency: Math.round(performance.now() - start), error: e.message };
        }
    }

    function updateProxyItem(proxy, result) {
        const item = document.getElementById(`proxy-${escapeHtml(proxy)}`);
        if (!item) return;
        item.classList.remove('testing');
        const statusEl = item.querySelector('.proxy-status');
        const detailEl = item.querySelector('.proxy-detail');
        if (result.success) {
            statusEl.innerHTML = '<i class="fas fa-check-circle" style="color:#16a34a;"></i>';
            detailEl.innerHTML = `<span class="latency">${result.latency}ms</span><span>👤 ${escapeHtml(result.name)}</span>`;
        } else {
            statusEl.innerHTML = '<i class="fas fa-times-circle" style="color:#dc2626;"></i>';
            detailEl.innerHTML = `<span>${escapeHtml(result.error || '请求失败')}</span>`;
        }
    }

    async function runProxyTests() {
        renderProxyLoading();
        const TARGET = 'https://api.bilibili.com/x/space/acc/info?mid=3493109964999279';
        for (const proxy of CORS_PROXIES) {
            const result = await testProxy(proxy, TARGET);
            updateProxyItem(proxy, result);
        }
    }

    async function runAll() {
        await Promise.all([runMonitor(), runProxyTests()]);
    }

    refreshAllBtn.addEventListener('click', runAll);
    window.addEventListener('load', runAll);
</script>
</body>
</html>
