<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>鸿渚の灵质空间 | 个人资源与技术博客</title>
    <meta name="description" content="鸿渚的个人分享页，提供壁纸、表情包、工具与原创文章。数据来自B站开放平台API。">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="common.css">
    <link rel="icon" id="dynamic-favicon" href="img/ico_1.ico">
    <style>
        .main-container {
            max-width: 1200px;
            margin: 90px auto 60px;
            padding: 0 1.5rem;
            display: flex;
            gap: 2rem;
            align-items: flex-start;
        }
        .sidebar { width: 300px; flex-shrink: 0; position: sticky; top: 100px; }
        .content { flex: 1; min-width: 0; }

        .profile-card {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-card);
            padding: 2rem;
            text-align: center;
            box-shadow: var(--shadow-md);
        }
        .profile-avatar {
            width: 100px; height: 100px;
            border-radius: 50%;
            border: 3px solid var(--primary-500);
            margin-bottom: 1rem;
            object-fit: cover;
        }
        .profile-card h2 { font-size: 1.6rem; margin-bottom: 0.3rem; color: var(--primary-600); }
        .profile-bio { color: var(--text-muted); margin-bottom: 0.5rem; font-size: 0.9rem; }
        .profile-level {
            display: inline-block;
            background: var(--primary-500); color: white;
            padding: 2px 12px; border-radius: 20px;
            font-size: 0.75rem; font-weight: 600; margin-bottom: 1rem;
        }
        .profile-extras { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.5rem; }

        .stats-row {
            display: flex; justify-content: space-around; gap: 0.5rem;
            padding: 1rem 0; margin: 1rem 0;
            border-top: 1px solid var(--border-light);
            border-bottom: 1px solid var(--border-light);
        }
        .stat-item { text-align: center; }
        .stat-value { font-size: 1.3rem; font-weight: 700; color: var(--primary-600); }
        .stat-label { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }

        .social-links { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 1.5rem; }
        .social-links a {
            display: flex; align-items: center; justify-content: center; gap: 6px;
            padding: 10px; border-radius: 40px; font-weight: 500; font-size: 0.9rem;
            text-decoration: none; transition: var(--transition); color: white; border: none;
        }
        .btn-bilibili { background: #fb7299; }
        .btn-bilibili:hover { background: #ff85ad; }
        .btn-github { background: #24292f; }
        .btn-github:hover { background: #3a3f47; }
        .btn-afdian { background: #946ce6; }
        .btn-afdian:hover { background: #b47ef0; }

        .latest-video-card {
            background: var(--bg-card); border: 1px solid var(--border-light);
            border-radius: var(--radius-card); padding: 1rem; margin-top: 1.5rem;
            box-shadow: var(--shadow-sm); transition: var(--transition);
        }
        .latest-video-card:hover { border-color: var(--primary-400); box-shadow: var(--shadow-hover); transform: translateY(-2px); }
        .latest-video-card img { width: 100%; border-radius: 12px; margin-bottom: 0.5rem; }
        .latest-video-card h4 { font-size: 0.95rem; color: var(--text-title); margin-bottom: 0.3rem; }
        .latest-video-card .video-meta { font-size: 0.75rem; color: var(--text-muted); }

        .articles-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
        .article-card {
            background: var(--bg-card); border: 1px solid var(--border-light);
            border-radius: var(--radius-card); padding: 1.5rem;
            box-shadow: var(--shadow-sm); transition: var(--transition); cursor: pointer;
        }
        .article-card:hover { border-color: var(--primary-400); box-shadow: var(--shadow-hover); transform: translateY(-2px); }
        .article-date { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem; }
        .article-title { font-size: 1.2rem; font-weight: 700; color: var(--text-title); margin-bottom: 0.5rem; }
        .article-summary { color: var(--text-desc); font-size: 0.9rem; line-height: 1.5; }
        .article-meta { font-size: 0.8rem; color: var(--primary-500); margin-bottom: 0.3rem; display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
        .tag-badge {
            display: inline-block;
            background: var(--primary-500); color: white;
            padding: 2px 8px; border-radius: 12px; font-size: 0.7rem; margin-right: 4px;
        }

        @media (max-width: 850px) {
            .main-container { flex-direction: column; }
            .sidebar { width: 100%; position: relative; top: 0; }
        }
        /* 新增移动端优化 */
        @media (max-width: 600px) {
            .profile-card { padding: 1.2rem !important; }
            .profile-avatar { width: 70px !important; height: 70px !important; }
            .profile-card h2 { font-size: 1.3rem !important; }
            .stats-row .stat-value { font-size: 1rem !important; }
            .social-links a { padding: 8px !important; font-size: 0.8rem !important; }
            .article-title { font-size: 1rem !important; }
            .article-summary { font-size: 0.85rem !important; }
        }
    </style>
</head>
<body>
<div class="bg-layer"></div>

<main class="main-container">
    <aside class="sidebar">
        <div class="profile-card" id="profileCard">
            <img class="profile-avatar" id="profileAvatar"
                 src="img/logo.png"
                 alt="鸿渚头像">
            <h2 id="profileName">鸿渚</h2>
            <p class="profile-bio" id="profileBio">资源分享 · 技术爱好者</p>
            <span class="profile-level" id="profileLevel">LV 0</span>
            <div class="profile-extras" id="profileExtras"></div>
            <div class="stats-row">
                <div class="stat-item">
                    <div class="stat-value" id="statFollowers">--</div>
                    <div class="stat-label">粉丝</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="statFollowing">--</div>
                    <div class="stat-label">关注</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="statLikes">--</div>
                    <div class="stat-label">获赞</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="statViews">--</div>
                    <div class="stat-label">播放量</div>
                </div>
            </div>
            <div class="social-links">
                <a href="https://space.bilibili.com/3493109964999279" target="_blank" class="btn-bilibili">
                    <i class="fab fa-bilibili"></i> B站
                </a>
                <a href="https://github.com/WatchFleeting" target="_blank" class="btn-github">
                    <i class="fab fa-github"></i> GitHub
                </a>
                <a href="https://afdian.com/a/lyxh-took" target="_blank" class="btn-afdian" style="grid-column: span 2;">
                    <i class="fas fa-bolt"></i> 爱发电赞助
                </a>
            </div>
        </div>
        <div class="latest-video-card" id="latestVideoCard" style="display:none;">
            <h4 style="margin-bottom:0.5rem;font-size:0.8rem;color:var(--text-muted);">
                <i class="fas fa-video"></i> 最新视频
            </h4>
            <a id="latestVideoLink" href="#" target="_blank" style="text-decoration:none;color:inherit;">
                <img id="latestVideoPic" src="" alt="" style="width:100%;border-radius:12px;">
                <h4 id="latestVideoTitle" style="font-size:0.9rem;color:var(--text-title);"></h4>
                <span class="video-meta" id="latestVideoMeta"></span>
            </a>
        </div>
    </aside>

    <section class="content">
        <h2 style="margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem; color: var(--primary-600);">
            <i class="fas fa-feather-alt"></i> 最新文章
        </h2>
        <div id="articlesContainer" class="articles-grid">
            <div class="loading-skeleton">文章加载中...</div>
        </div>
    </section>
</main>

<script src="common.js"></script>
<script>
    window.addEventListener('load', async () => {
        const HONGZHU_UID = '3493109964999279';

        try {
            const profile = await fetchBilibiliFullProfile(HONGZHU_UID);
            if (profile.avatar) {
                const avatarImg = document.getElementById('profileAvatar');
                avatarImg.src = profile.avatar;
                avatarImg.onerror = function() {
                    this.src = 'img/logo.png';
                };
            }
            if (profile.name) document.getElementById('profileName').textContent = profile.name;
            if (profile.sign) {
                const bioEl = document.getElementById('profileBio');
                bioEl.textContent = profile.sign.length > 40 ? profile.sign.slice(0, 40) + '...' : profile.sign;
            }
            if (profile.level && profile.level > 0) {
                document.getElementById('profileLevel').textContent = 'LV ' + profile.level;
            }
            if (profile.birthday || profile.sex) {
                const extras = document.getElementById('profileExtras');
                const parts = [];
                if (profile.birthday) parts.push('🎂 ' + profile.birthday);
                if (profile.sex) parts.push(profile.sex === '男' ? '♂' : profile.sex === '女' ? '♀' : '');
                extras.textContent = parts.join(' · ');
            }

            function formatNumber(num) {
                if (typeof num === 'number' && num >= 10000) return (num / 10000).toFixed(1) + '万';
                return String(num);
            }
            document.getElementById('statFollowers').textContent = formatNumber(profile.follower);
            document.getElementById('statFollowing').textContent = formatNumber(profile.following);
            document.getElementById('statLikes').textContent = formatNumber(profile.likes);
            document.getElementById('statViews').textContent = formatNumber(profile.archiveView);

            if (profile.latestVideo) {
                const v = profile.latestVideo;
                const card = document.getElementById('latestVideoCard');
                card.style.display = 'block';
                document.getElementById('latestVideoLink').href = 'https://www.bilibili.com/video/' + v.bvid;
                document.getElementById('latestVideoPic').src = v.pic;
                document.getElementById('latestVideoTitle').textContent = v.title.length > 20 ? v.title.slice(0, 20) + '...' : v.title;
                const created = new Date(v.created * 1000);
                const playCount = v.play >= 10000 ? (v.play / 10000).toFixed(1) + '万播放' : v.play + '播放';
                document.getElementById('latestVideoMeta').textContent = playCount + ' · ' + created.toLocaleDateString('zh-CN');
            }
        } catch (e) {
            console.warn('个人信息加载失败', e);
        }

        const articlesContainer = document.getElementById('articlesContainer');
        try {
            const articles = await getAllArticles();
            if (!articles.length) {
                articlesContainer.innerHTML = '<div class="error-text">暂无文章</div>';
            } else {
                articlesContainer.innerHTML = articles.map(article => {
                    const meta = article.meta || {};
                    const tagsHtml = meta.tags && meta.tags.length ? meta.tags.map(tag => `<span class="tag-badge">#${escapeHtml(tag)}</span>`).join('') : '';
                    const authorHtml = meta.author ? `<span class="article-meta">✍️ ${escapeHtml(meta.author)}</span>` : '';
                    const readTimeHtml = meta.readTime ? `<span class="article-meta">· ${escapeHtml(meta.readTime)}</span>` : '';
                    return `
                        <article class="article-card"
                                 data-title="${escapeHtml(meta.title || '')}"
                                 data-date="${escapeHtml(meta.date || '')}"
                                 data-content="${encodeURIComponent(article.content)}"
                                 data-meta='${encodeURIComponent(JSON.stringify(meta))}'>
                            <div class="article-date">${escapeHtml(meta.date || '')}</div>
                            <h3 class="article-title">${escapeHtml(meta.title || '无标题')}</h3>
                            <div class="article-meta" style="display:flex; align-items:center; gap:0.5rem; flex-wrap:wrap; margin-bottom:0.3rem;">
                                ${authorHtml} ${readTimeHtml}
                            </div>
                            <p class="article-summary">${escapeHtml(meta.summary || '')}</p>
                            ${tagsHtml ? `<div style="margin-top:0.5rem;">${tagsHtml}</div>` : ''}
                        </article>
                    `;
                }).join('');

                articlesContainer.querySelectorAll('.article-card').forEach((card, idx) => {
                    card.addEventListener('click', () => {
                        const article = articles[idx];
                        const meta = article.meta || {};
                        showArticleDetail(
                            meta.title || '',
                            meta.date || '',
                            decodeURIComponent(card.dataset.content),
                            meta
                        );
                    });
                });
            }
        } catch (e) {
            articlesContainer.innerHTML = `<div class="error-text">加载文章失败: ${e.message}</div>`;
        }
    });

    function showArticleDetail(title, date, markdownContent, meta) {
        const exist = document.querySelector('.article-detail-overlay');
        if (exist) exist.remove();
        const overlay = document.createElement('div');
        overlay.className = 'article-detail-overlay';
        let html = markdownContent
            .replace(/### (.*)/g, '<h3>$1</h3>')
            .replace(/## (.*)/g, '<h2>$1</h2>')
            .replace(/# (.*)/g, '<h1>$1</h1>')
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank">$1</a>')
            .replace(/\n/g, '<br>');

        let metaInfo = '';
        if (meta) {
            if (meta.author) metaInfo += `<span style="margin-right:1rem;">✍️ ${escapeHtml(meta.author)}</span>`;
            if (meta.readTime) metaInfo += `<span style="margin-right:1rem;">⏱️ ${escapeHtml(meta.readTime)}</span>`;
            if (meta.tags && meta.tags.length) {
                metaInfo += `<div style="margin-top:0.5rem;">${meta.tags.map(tag => `<span class="tag-badge">#${escapeHtml(tag)}</span>`).join('')}</div>`;
            }
        }

        overlay.innerHTML = `
            <div class="article-detail-box">
                <button class="article-detail-close">&times;</button>
                <h2>${escapeHtml(title)}</h2>
                <small style="color: var(--text-muted);">${escapeHtml(date)}</small>
                <div style="margin-top:0.5rem; color: var(--text-muted);">${metaInfo}</div>
                <div style="margin-top:1rem; line-height:1.7;">${html}</div>
            </div>
        `;
        document.body.appendChild(overlay);
        overlay.querySelector('.article-detail-close').onclick = () => {
            overlay.classList.remove('active');
            setTimeout(() => overlay.remove(), 300);
        };
        overlay.addEventListener('click', e => {
            if (e.target === overlay) {
                overlay.classList.remove('active');
                setTimeout(() => overlay.remove(), 300);
            }
        });
        requestAnimationFrame(() => overlay.classList.add('active'));
    }
</script>
</body>
</html>
