<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>友情链接 · 鸿渚の灵质空间</title>
    <meta name="description" content="合作伙伴与推荐链接">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="common.css">
    <link rel="icon" id="dynamic-favicon" href="img/ico_1.ico">
    <style>
        .main-container { max-width: 1200px; margin: 90px auto 60px; padding: 0 1.5rem; }
        .links-card {
            background: var(--bg-card); border-radius: var(--radius-card); padding: var(--space-xl);
            border: 1px solid var(--border-light); box-shadow: var(--shadow-md); margin-bottom: var(--space-xl);
        }
        .links-title {
            font-size: 2rem; font-weight: 700; color: var(--primary-600);
            margin-bottom: var(--space-lg); display: flex; align-items: center; gap: var(--space-sm);
        }
        .links-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: var(--space-lg); }
        .link-item {
            background: var(--bg-page); border-radius: var(--radius-card); padding: var(--space-lg);
            border: 1px solid var(--border-light); transition: var(--transition);
            text-decoration: none; color: inherit; display: flex; align-items: center; gap: var(--space-md);
        }
        .link-item:hover { border-color: var(--primary-400); box-shadow: var(--shadow-hover); transform: translateY(-2px); }
        .link-icon {
            width: 48px; height: 48px; border-radius: 50%;
            background: linear-gradient(145deg, var(--primary-400), var(--secondary-400));
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1.5rem; overflow: hidden;
        }
        .link-icon img { width: 100%; height: 100%; object-fit: cover; }
        .link-info { flex: 1; }
        .link-info h3 { font-size: 1.1rem; margin-bottom: 4px; color: var(--text-title); }
        .link-info p { color: var(--text-muted); font-size: 0.85rem; }
        .apply-section {
            margin-top: var(--space-xl); padding-top: var(--space-lg);
            border-top: 1px solid var(--border-light); text-align: center;
        }
        .apply-section p { color: var(--text-desc); margin-bottom: var(--space-md); }
        .apply-btn {
            display: inline-flex; align-items: center; gap: var(--space-sm);
            background: var(--primary-500); color: white; padding: var(--space-md) var(--space-xl);
            border-radius: 40px; text-decoration: none; font-weight: 600; transition: var(--transition);
        }
        .apply-btn:hover { background: var(--primary-600); transform: translateY(-2px); }
    </style>
</head>
<body>
<div class="bg-layer"></div>
<main class="main-container">
    <div class="links-card">
        <h1 class="links-title"><i class="fas fa-link"></i> 友情链接</h1>
        <div class="links-grid" id="friendsContainer">
            <div class="loading-skeleton">加载中...</div>
        </div>
        <div class="apply-section">
            <p>如果您想交换友情链接，欢迎通过以下方式联系我：<br>
            <i class="fas fa-envelope"></i> lzc737507@outlook.com</p>
            <a href="mailto:lzc737507@outlook.com" class="apply-btn"><i class="fas fa-paper-plane"></i> 申请友链</a>
        </div>
    </div>
</main>
<script src="common.js"></script>
<script>
    async function loadFriends() {
        const friends = await loadJSON('data/friends.json');
        const container = document.getElementById('friendsContainer');
        if (!friends || friends.length === 0) {
            container.innerHTML = '<div class="empty-state">暂无友链</div>';
            return;
        }
        container.innerHTML = friends.map(f => `
            <a href="${f.url}" target="_blank" rel="noopener" class="link-item">
                <div class="link-icon">
                    ${f.avatar ? `<img src="${f.avatar}" alt="${escapeHtml(f.name)}" onerror="this.style.display='none';">` : '<i class="fas fa-link"></i>'}
                </div>
                <div class="link-info">
                    <h3>${escapeHtml(f.name)}</h3>
                    <p>${escapeHtml(f.desc)}</p>
                </div>
            </a>
        `).join('');
    }
    window.addEventListener('load', loadFriends);
</script>
</body>
</html>
