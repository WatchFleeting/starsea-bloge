<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>友情链接 · 鸿渚の灵质空间</title>
    <meta name="description" content="合作伙伴与推荐链接">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="common.css">
    <link rel="icon" id="dynamic-favicon" href="img/ico_1.ico">
    <style>
        .main-container {
            max-width: 900px;
            margin: 90px auto 60px;
            padding: 0 1.5rem;
        }
        .friends-card {
            background: var(--bg-card);
            border-radius: var(--radius-card);
            padding: 2rem;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-md);
        }
        .friends-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-600);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .friends-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.2rem;
        }
        .friend-item {
            background: var(--bg-page);
            border-radius: 14px;
            padding: 1.2rem;
            border: 1px solid var(--border-light);
            text-decoration: none;
            color: inherit;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            transition: var(--transition);
        }
        .friend-item:hover {
            border-color: var(--primary-400);
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }
        .friend-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(145deg, var(--primary-400), var(--secondary-400));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            overflow: hidden;
            flex-shrink: 0;
        }
        .friend-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .friend-info {
            flex: 1;
            min-width: 0;
        }
        .friend-info h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.2rem;
            color: var(--text-title);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .friend-info p {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .apply-section {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-light);
            text-align: center;
            color: var(--text-desc);
        }
        .apply-section p {
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }
        .apply-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--primary-500);
            color: white;
            padding: 0.7rem 1.8rem;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }
        .apply-btn:hover {
            background: var(--primary-600);
            transform: translateY(-1px);
        }
        .loading-skeleton {
            color: var(--text-muted);
            background: var(--bg-card);
            padding: 12px;
            border-left: 3px solid var(--primary-500);
        }
        .error-text {
            color: #e05a5a;
            background: #fff5f5;
            padding: 12px;
            border-left: 3px solid #e05a5a;
        }
        @media (max-width: 600px) {
            .friends-grid {
                grid-template-columns: 1fr;
            }
            .friends-card {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
<div class="bg-layer"></div>

<main class="main-container">
    <div class="friends-card">
        <h1 class="friends-title">
            <i class="fas fa-link"></i> <span data-i18n="friends">友情链接</span>
        </h1>

        <div class="friends-grid" id="friendsContainer">
            <div class="loading-skeleton">加载中...</div>
        </div>

        <div class="apply-section">
            <p data-i18n="apply_text">如果您想交换友情链接，欢迎通过以下方式联系：<br>
            <i class="fas fa-envelope"></i> lzc737507@outlook.com</p>
            <a href="mailto:lzc737507@outlook.com" class="apply-btn" data-i18n="apply_btn">
                <i class="fas fa-paper-plane"></i> 申请友链
            </a>
        </div>
    </div>
</main>

<script src="common.js"></script>
<script>
    async function loadFriends() {
        const container = document.getElementById('friendsContainer');
        try {
            const friends = await loadJSON('data/friends.json');
            if (!friends || friends.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无友链</div>';
                return;
            }
            container.innerHTML = friends.map(f => `
                <a href="${f.url}" target="_blank" rel="noopener" class="friend-item">
                    <div class="friend-avatar">
                        ${f.avatar ? `<img src="${f.avatar}" alt="${escapeHtml(f.name)}" onerror="this.style.display='none';">` : '<i class="fas fa-link"></i>'}
                    </div>
                    <div class="friend-info">
                        <h3>${escapeHtml(f.name)}</h3>
                        <p>${escapeHtml(f.desc)}</p>
                    </div>
                </a>
            `).join('');
        } catch (e) {
            container.innerHTML = `<div class="error-text">友链加载失败：${escapeHtml(e.message)}</div>`;
        }
    }

    // 语言切换后更新静态文本
    window.addEventListener('load', async () => {
        // 等待 i18n 加载完成
        let attempts = 0;
        while (!window.i18nData && attempts < 40) {
            await new Promise(resolve => setTimeout(resolve, 50));
            attempts++;
        }
        loadFriends();
    });
</script>
</body>
</html>
