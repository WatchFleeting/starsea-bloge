<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>图片库 · 鸿渚の灵质空间</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="common.css">
    <link rel="icon" id="dynamic-favicon" href="img/ico_1.ico">
    <style>
        .main-container { max-width: 1400px; margin: 90px auto 60px; padding: 0 1.5rem; }
        .wallpaper-section { margin-bottom: 2.5rem; }
        .section-header {
            margin-bottom: 1.2rem;
            border-left: 6px solid var(--primary-500);
            padding-left: 20px;
            display: flex; align-items: center; gap: 12px;
            color: var(--text-title);
        }
        .section-header h2 { font-size: 1.6rem; font-weight: 700; }
        .wallpaper-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1.5rem;
        }
        .wallpaper-card {
            background: var(--bg-card); border: 1px solid var(--border-light);
            border-radius: var(--radius-card); overflow: hidden;
            box-shadow: var(--shadow-sm); transition: var(--transition);
        }
        .wallpaper-card:hover { border-color: var(--primary-400); box-shadow: var(--shadow-hover); transform: translateY(-4px); }
        .card-preview {
            position: relative; aspect-ratio: 16/9; background: #eef2f6;
            cursor: pointer; overflow: hidden;
        }
        .card-preview img, .card-preview video { width: 100%; height: 100%; object-fit: cover; }
        .card-info {
            padding: 0.8rem 1rem;
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 0.5rem;
        }
        .card-info h3 { font-size: 0.9rem; font-weight: 600; }
        .download-btn {
            background: var(--bg-card); border: 1px solid var(--border-light);
            border-radius: 40px; padding: 5px 14px; font-size: 0.75rem; font-weight: 600;
            color: var(--text-title); text-decoration: none;
            display: inline-flex; align-items: center; gap: 5px;
            transition: var(--transition);
        }
        .download-btn:hover { background: var(--primary-500); border-color: var(--primary-500); color: white; }
        .badge-series {
            position: absolute; top: 8px; left: 8px;
            background: rgba(6,182,212,0.85); backdrop-filter: blur(6px);
            padding: 3px 8px; font-size: 0.65rem; font-weight: 600; color: white;
            border-left: 2px solid white; z-index: 2;
        }
        .video-indicator, .gallery-indicator {
            position: absolute; bottom: 6px; right: 6px;
            background: rgba(0,0,0,0.6); color: white; font-size: 0.65rem;
            padding: 3px 7px; backdrop-filter: blur(4px); border-radius: 4px;
        }

        /* 图集全屏查看 */
        .gallery-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.92); z-index:20000;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column;
        }
        .gallery-overlay img {
            max-width: 90vw; max-height: 80vh; object-fit: contain;
            border-radius: 8px; box-shadow: 0 0 20px rgba(6,182,212,0.3);
        }
        .gallery-controls {
            display: flex; gap: 20px; margin-top: 16px; align-items: center;
        }
        .gallery-nav-btn {
            background: var(--primary-500); border: none; color: white;
            font-size: 1.5rem; padding: 8px 16px; border-radius: 8px;
            cursor: pointer; transition: background 0.2s;
        }
        .gallery-nav-btn:hover { background: var(--primary-600); }
        .gallery-close-btn {
            position: absolute; top: 16px; right: 16px;
            background: rgba(0,0,0,0.6); border: none; color: white;
            font-size: 2rem; width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }

        @media (max-width: 600px) {
            .wallpaper-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; }
            .card-info h3 { font-size: 0.8rem; }
            .badge-series { font-size: 0.6rem; padding: 2px 6px; }
            .download-btn { padding: 4px 10px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>
<div class="bg-layer"></div>
<main class="main-container">
    <div id="wallpaperSections"></div>
</main>

<script src="common.js"></script>
<script>
    // 本地备用路径
    const LOCAL_BASE = './background/';

    // 获取资源完整 URL（优先 WebOS 直链，否则拼接本地路径）
    function getUrl(filename) {
        const webosUrl = typeof getWebosUrl === 'function' ? getWebosUrl('wallpapers', filename) : null;
        if (webosUrl) return webosUrl;
        return LOCAL_BASE + encodeURIComponent(filename);
    }

    async function loadWallpapers() {
        try {
            const data = await loadJSON('data/wallpapers.json');

            // 按 series 分组
            const groups = {};
            data.forEach(item => {
                const key = item.series || '其他';
                if (!groups[key]) groups[key] = [];
                groups[key].push(item);
            });

            let html = '';
            for (const [series, items] of Object.entries(groups)) {
                html += `
                    <div class="wallpaper-section">
                        <div class="section-header"><h2>${escapeHtml(series)}</h2></div>
                        <div class="wallpaper-grid">
                            ${items.map(generateCard).join('')}
                        </div>
                    </div>`;
            }

            document.getElementById('wallpaperSections').innerHTML = html || '<div class="error-text">暂无图片</div>';

            // 绑定卡片点击事件
            document.querySelectorAll('.card-preview').forEach(el => el.addEventListener('click', function(e) {
                if (e.target.closest('.download-btn')) return;
                const type = this.dataset.type;
                if (type === 'gallery') {
                    const images = JSON.parse(decodeURIComponent(this.dataset.images));
                    showGallery(images);
                } else if (type === 'dynamic_preview') {
                    showDynamicFullscreen(this.dataset.full);
                } else {
                    showImagePreview(this.dataset.full);
                }
            }));

        } catch (error) {
            console.error('图片库加载失败:', error);
            document.getElementById('wallpaperSections').innerHTML = '<div class="error-text">⚠️ 图片库数据加载失败</div>';
        }
    }

    function generateCard(item) {
        const isGallery = (item.type === 'gallery') && Array.isArray(item.images);
        const isDynamic = (item.type === 'dynamic_preview');

        const previewFilename = isGallery ? item.images[0] : item.filename;
        const previewUrl = getUrl(previewFilename);
        const fullUrl = isGallery ? previewUrl : getUrl(item.filename);

        let downloadUrl;
        if (isGallery && item.zip) {
            downloadUrl = getUrl(item.zip);
        } else {
            downloadUrl = fullUrl;
        }

        let mediaTag;
        if (isDynamic) {
            mediaTag = `<video src="${previewUrl}" autoplay loop muted playsinline style="width:100%;height:100%;object-fit:cover;"></video>`;
        } else {
            mediaTag = `<img src="${previewUrl}" alt="${escapeHtml(item.name)}" loading="lazy" onerror="this.src='img/fallback.png'">`;
        }

        const seriesHtml = item.series ? `<div class="badge-series">${item.series}</div>` : '';

        let typeIndicator = '';
        if (isGallery) {
            typeIndicator = `<div class="gallery-indicator">🖼️ 图集 (${item.images.length}张)</div>`;
        } else if (isDynamic) {
            typeIndicator = `<div class="video-indicator">🎬 动态图片</div>`;
        }

        const dataType = isGallery ? 'gallery' : item.type;
        const dataImages = isGallery ? encodeURIComponent(JSON.stringify(item.images.map(img => getUrl(img)))) : '';

        const infoLink = item.bili || '#';
        const downloadFileName = isGallery && item.zip ? item.zip : item.filename;

        return `<div class="wallpaper-card">
            <div class="card-preview" data-full="${fullUrl}" data-type="${dataType}" data-images="${dataImages}">
                ${seriesHtml}${mediaTag}${typeIndicator}
            </div>
            <div class="card-info">
                <h3>${escapeHtml(item.name)}</h3>
                <div style="display:flex; gap:6px;">
                    <a class="download-btn" href="${infoLink}" target="_blank" title="查看详情">
                        <i class="fas fa-info-circle"></i>
                    </a>
                    <a class="download-btn" href="${downloadUrl}" download="${escapeHtml(downloadFileName)}" target="_blank" title="下载">
                        <i class="fas fa-download"></i> 下载
                    </a>
                </div>
            </div></div>`;
    }

    // 图集浏览
    let currentGallery = [];

    function showGallery(images) {
        currentGallery = images;
        renderGallery(0);
    }

    function renderGallery(index) {
        const old = document.querySelector('.gallery-overlay');
        if (old) old.remove();

        const overlay = document.createElement('div');
        overlay.className = 'gallery-overlay';
        overlay.innerHTML = `
            <button class="gallery-close-btn">&times;</button>
            <img src="${currentGallery[index]}" alt="图集">
            <div class="gallery-controls">
                <button class="gallery-nav-btn" id="galleryPrev"><i class="fas fa-chevron-left"></i></button>
                <span style="color:white;">${index + 1} / ${currentGallery.length}</span>
                <button class="gallery-nav-btn" id="galleryNext"><i class="fas fa-chevron-right"></i></button>
            </div>
        `;
        document.body.appendChild(overlay);

        overlay.querySelector('.gallery-close-btn').onclick = () => overlay.remove();
        overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });

        overlay.querySelector('#galleryPrev').onclick = () => {
            const newIndex = (index - 1 + currentGallery.length) % currentGallery.length;
            renderGallery(newIndex);
        };
        overlay.querySelector('#galleryNext').onclick = () => {
            const newIndex = (index + 1) % currentGallery.length;
            renderGallery(newIndex);
        };
    }

    // 单图预览
    function showImagePreview(url) {
        let overlay = document.querySelector('.image-preview-overlay');
        if (!overlay) {
            overlay = document.createElement('div');
            overlay.className = 'image-preview-overlay';
            overlay.innerHTML = '<button class="image-preview-close">&times;</button><img class="image-preview-img">';
            document.body.appendChild(overlay);
            overlay.querySelector('.image-preview-close').onclick = () => overlay.classList.remove('active');
            overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.classList.remove('active'); });
        }
        overlay.querySelector('img').src = url;
        overlay.classList.add('active');
    }

    function showDynamicFullscreen(videoUrl) {
        const old = document.querySelector('.dynamic-video-overlay');
        if (old) old.remove();
        const overlay = document.createElement('div');
        overlay.className = 'image-preview-overlay';
        overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.96);z-index:20000;display:flex;align-items:center;justify-content:center;';
        overlay.innerHTML = `<div style="position:relative;width:85%;max-width:1100px;"><video controls autoplay loop style="width:100%;border:3px solid var(--primary-500);background:#000;" src="${videoUrl}"></video><button style="position:absolute;top:-44px;right:0;background:var(--primary-500);color:white;border:none;font-size:1.5rem;padding:0 16px;cursor:pointer;font-weight:bold;">&times;</button></div>`;
        document.body.appendChild(overlay);
        const closeBtn = overlay.querySelector('button');
        const close = () => overlay.remove();
        closeBtn.onclick = close;
        overlay.addEventListener('click', function(e) { if (e.target === overlay) close(); });
    }

    window.addEventListener('load', loadWallpapers);
</script>
</body>
</html>
