<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="log">文章日志 · 鸿渚の灵质空间</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="common.css">
    <link rel="icon" id="dynamic-favicon" href="img/ico_1.ico">
    <style>
        .main-container { max-width: 900px; margin: 90px auto 60px; padding: 0 1.5rem; }
        .log-card {
            background: var(--bg-card); border: 1px solid var(--border-light);
            border-radius: var(--radius-card); padding: 2rem;
            box-shadow: var(--shadow-md);
        }
        .log-title {
            font-size: 1.8rem; font-weight: 700; color: var(--primary-600);
            margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem;
        }
        .log-entry {
            padding: 1rem 0; border-bottom: 1px dashed var(--border-light);
            cursor: pointer; transition: background 0.15s;
        }
        .log-entry:last-child { border-bottom: none; }
        .log-entry:hover { background: var(--bg-page); border-radius: 12px; padding-left: 1rem; padding-right: 1rem; }
        .log-date { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.25rem; }
        .log-entry-title {
            font-size: 1.15rem; font-weight: 600; color: var(--text-title);
            margin-bottom: 0.3rem;
        }
        .log-entry-title:hover { color: var(--primary-500); }
        .log-summary { font-size: 0.9rem; color: var(--text-desc); line-height: 1.4; }
    </style>
</head>
<body>
<div class="bg-layer"></div>
<main class="main-container">
    <div class="log-card" id="logList">
        <div class="log-title"><i class="fas fa-history"></i> <span>文章日志</span></div>
        <div class="loading"><i class="fas fa-spinner fa-pulse"></i> 加载中...</div>
    </div>
</main>
<script src="common.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        const container = document.getElementById('logList');
        try {
            const allContent = await getAllContent();
            if (!allContent.length) {
                container.innerHTML = '<div class="log-title"><i class="fas fa-history"></i> 文章日志</div><div class="empty-state">暂无内容</div>';
                return;
            }
            container.innerHTML = '<div class="log-title"><i class="fas fa-history"></i> 文章日志</div>';
            allContent.forEach(item => {
                const meta = item.meta;
                const entry = document.createElement('div');
                entry.className = 'log-entry';
                entry.innerHTML = `
                    <div class="log-date">${escapeHtml(meta.date || '')}</div>
                    <div class="log-entry-title">${escapeHtml(meta.title || '无标题')}</div>
                    <div class="log-summary">${escapeHtml(meta.summary || '')}</div>
                `;
                entry.addEventListener('click', () => {
                    showArticleDetail(meta.title, meta.date, item.content, meta);
                });
                container.appendChild(entry);
            });
        } catch (e) {
            container.innerHTML = `<div class="error-state">加载失败：${escapeHtml(e.message)}</div>`;
        }
    });
</script>
</body>
</html>
