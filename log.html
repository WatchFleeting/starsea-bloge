<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章日志 · 鸿渚の灵质空间</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="common.css">
    <link rel="icon" id="dynamic-favicon" href="img/ico_1.ico">
    <style>
        .main-container {
            max-width: 1200px;
            margin: 90px auto 60px;
            padding: 0 1.5rem;
        }
        .log-list {
            background: var(--bg-card);
            border-radius: var(--radius-card);
            padding: var(--space-xl);
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-md);
        }
        .log-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-600);
            margin-bottom: var(--space-lg);
            display: flex;
            align-items: center;
            gap: var(--space-sm);
        }
        .log-entry {
            padding: var(--space-md) 0;
            border-bottom: 1px dashed var(--border-light);
        }
        .log-entry:last-child { border-bottom: none; }
        .log-date {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 0.2rem;
        }
        .log-entry-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-title);
            margin-bottom: 0.3rem;
            cursor: pointer;
        }
        .log-entry-title:hover { color: var(--primary-500); }
        .log-summary {
            color: var(--text-desc);
            font-size: 0.9rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        @media (max-width: 600px) {
            .log-entry-title { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
<div class="bg-layer"></div>

<main class="main-container">
    <div class="log-list" id="logList">
        <div class="log-title"><i class="fas fa-history"></i> 文章日志</div>
        <div class="loading"><i class="fas fa-spinner fa-spin"></i> 加载中...</div>
    </div>
</main>

<script src="common.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        const container = document.getElementById('logList');
        try {
            const allContent = await getAllContent();
            if (!allContent.length) {
                container.innerHTML = '<div class="empty-state">暂无内容</div>';
                return;
            }
            container.innerHTML = '<div class="log-title"><i class="fas fa-history"></i> 文章日志</div>';
            allContent.forEach(item => {
                const meta = item.meta;
                const entry = document.createElement('div');
                entry.className = 'log-entry';
                entry.innerHTML = `
                    <div class="log-date">${escapeHtml(meta.date || '')}</div>
                    <div class="log-entry-title">${escapeHtml(meta.title || '无标题')}</div>
                    <div class="log-summary">${escapeHtml(meta.summary || '')}</div>
                `;
                entry.addEventListener('click', () => {
                    showArticleDetail(meta.title, meta.date, item.content, meta);
                });
                container.appendChild(entry);
            });
        } catch (e) {
            container.innerHTML = `<div class="error-state">加载失败：${escapeHtml(e.message)}</div>`;
        }
    });
</script>
</body>
</html>
