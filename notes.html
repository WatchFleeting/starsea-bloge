<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>便签</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#111827; color:#eef5ff; font-family: 'Segoe UI', system-ui; height:100vh; display:flex; flex-direction:column; }
        .toolbar { padding:8px 12px; display:flex; gap:8px; background:rgba(16,22,32,0.9); border-bottom:1px solid #39C5BB; }
        .toolbar button { background:rgba(27,37,55,0.7); border:1px solid #39C5BB; color:#66ccff; padding:4px 12px; border-radius:6px; cursor:pointer; }
        .toolbar button:hover { background:rgba(57,197,187,0.3); color:white; }
        textarea { flex:1; background:#1e2a3c; border:none; color:#eef5ff; padding:12px; resize:none; font-size:0.9rem; }
    </style>
</head>
<body>
<div class="toolbar">
    <button id="saveBtn"><i class="fa fa-save"></i> 保存</button>
    <button id="loadBtn"><i class="fa fa-folder-open"></i> 加载</button>
    <button id="clearBtn"><i class="fa fa-trash"></i> 清空</button>
</div>
<textarea id="notesArea" placeholder="写点什么..."></textarea>
<script>
    const area = document.getElementById('notesArea'),
          save = document.getElementById('saveBtn'),
          load = document.getElementById('loadBtn'),
          clear = document.getElementById('clearBtn');
    save.onclick = ()=>{ localStorage.setItem('webNotes', area.value); alert('已保存'); }
    load.onclick = ()=>{ area.value = localStorage.getItem('webNotes') || ''; }
    clear.onclick = ()=>{ if(confirm('清空便签？')) area.value = ''; }
    window.onload = ()=>{ area.value = localStorage.getItem('webNotes') || ''; }
</script>
</body>
</html>
